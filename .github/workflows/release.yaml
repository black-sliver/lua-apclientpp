# IMPORTANT: run this **after** builds are complete
# TODO: trigger automatically

name: Release

on: workflow_dispatch  # NOTE: build happens automatically on tag push, release is triggered manually

permissions:
  contents: write  # required to add to releases

jobs:

  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Set env
        if: ${{ github.ref_type == 'tag' }}
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Create Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@07399f331709e4e13ea561e9e534e3b0dc3fb687
        with:
          draft: true
          name: lua-apclientpp ${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: [prepare]

    strategy:
      matrix:
        lua:
          - lua51
          - lua52
          - lua53
          - lua54

    steps:
      - name: Grab README
        uses: actions/checkout@v6.0.2
        with:
          path: src

      - name: Download ${{ matrix.lua }} Artifacts
        id: download-artifact
        uses: dawidd6/action-download-artifact@8a338493df3d275e4a7a63bcff3b8fe97e51a927  # v19
        with:
          workflow: build.yaml
          name: ${{ matrix.lua }}|license
          name_is_regexp: true

      - name: Bundle ${{ matrix.lua }}
        run: |
          for d in *-lua*; do
            cp lua-apclientpp-license/* $d/
          done
          mkdir -p ${{ matrix.lua }}
          cp src/README.md ${{ matrix.lua }}/
          for d in lua-apclientpp-${{ matrix.lua }}*; do
            mkdir -p ${{ matrix.lua }}/${d:15}
            cp $d/* ${{ matrix.lua }}/${d:15}/
          done
          7z a -mx=9 -ms=on ${{ matrix.lua }}.7z ${{ matrix.lua }}

      - name: Upload ${{ matrix.lua }} Bundle
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.lua }}
          path: ${{ matrix.lua }}.7z

      - name: Set env
        if: ${{ github.ref_type == 'tag' }}
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Release ${{ matrix.lua }} Bundle
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@07399f331709e4e13ea561e9e534e3b0dc3fb687
        with:
          draft: true
          name: lua-apclientpp ${{ env.RELEASE_TAG }}
          files: ${{ matrix.lua }}.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
